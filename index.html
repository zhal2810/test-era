<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans,'Inter',sans-serif);background:transparent;color:var(--text-primary);font-size:14px}
:root{
  --c-bg:#0d0f12;--c-card:#161a22;--c-card2:#202635;--c-border:#2a3045;
  --c-text:#e2e8f0;--c-muted:#64748b;--c-accent:#3b82f6;--c-gold:#f59e0b;
  --c-plat:#8b5cf6;--c-silver:#94a3b8;--c-bronze:#d97706;
}
.root{background:var(--c-bg);min-height:400px;border-radius:12px;padding:16px;color:var(--c-text)}
.search-row{display:flex;gap:8px;margin-bottom:16px}
.search-row input{flex:1;background:var(--c-card);border:1px solid var(--c-border);border-radius:8px;padding:8px 12px;color:var(--c-text);font-size:14px;outline:none}
.search-row input:focus{border-color:var(--c-accent)}
.search-row button{background:var(--c-accent);color:#fff;border:none;border-radius:8px;padding:8px 16px;cursor:pointer;font-size:14px;font-weight:500;white-space:nowrap}
.search-row button:hover{background:#2563eb}
.search-row button:disabled{opacity:.5;cursor:not-allowed}
.tabs{display:flex;gap:4px;margin-bottom:16px;background:var(--c-card);border-radius:8px;padding:4px}
.tab{flex:1;text-align:center;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:13px;color:var(--c-muted);transition:all .2s}
.tab.active{background:var(--c-card2);color:var(--c-text);font-weight:500}
.error{background:#1a0a0a;border:1px solid #7f1d1d;border-radius:8px;padding:12px;color:#fca5a5;font-size:13px;margin-bottom:12px}
.loading{text-align:center;padding:40px;color:var(--c-muted)}
.spinner{display:inline-block;width:24px;height:24px;border:2px solid var(--c-border);border-top-color:var(--c-accent);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:8px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:60px 20px;color:var(--c-muted)}
.empty h3{font-size:16px;margin-bottom:8px;color:var(--c-text)}

/* Player Card */
.player-card{background:var(--c-card);border:1px solid var(--c-border);border-radius:12px;padding:16px;margin-bottom:12px}
.player-header{display:flex;align-items:center;gap:14px}
.avatar{width:56px;height:56px;border-radius:50%;background:var(--c-card2);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:var(--c-accent);border:2px solid var(--c-border);flex-shrink:0;overflow:hidden}
.avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.player-info h2{font-size:18px;font-weight:600;margin-bottom:2px}
.player-info .sub{font-size:12px;color:var(--c-muted);margin-bottom:6px}
.badges{display:flex;gap:6px;flex-wrap:wrap}
.badge{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500}
.badge-level{background:#1e3a5f;color:#60a5fa}
.badge-country{background:#1a2e1a;color:#86efac}
.badge-mu{background:#2d1f40;color:#c084fc}

/* Stats grid */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:12px}
.stat-card{background:var(--c-card);border:1px solid var(--c-border);border-radius:10px;padding:12px}
.stat-label{font-size:11px;color:var(--c-muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.stat-value{font-size:18px;font-weight:600}
.stat-sub{font-size:11px;color:var(--c-muted);margin-top:2px}
.gold-text{color:var(--c-gold)}
.plat-text{color:var(--c-plat)}

/* Wealth chart */
.wealth-section{background:var(--c-card);border:1px solid var(--c-border);border-radius:12px;padding:16px;margin-bottom:12px}
.section-title{font-size:13px;font-weight:500;color:var(--c-muted);margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px}
.wealth-chart{display:flex;gap:16px;align-items:center;flex-wrap:wrap}
.donut-wrap{position:relative;width:120px;height:120px;flex-shrink:0}
.donut-wrap svg{width:100%;height:100%}
.donut-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.donut-total{font-size:13px;font-weight:600;color:var(--c-text)}
.donut-label{font-size:10px;color:var(--c-muted)}
.wealth-legend{flex:1;min-width:140px}
.legend-item{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:12px}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.legend-name{flex:1;color:var(--c-muted)}
.legend-val{font-weight:500;color:var(--c-text)}

/* Rankings */
.rank-section{background:var(--c-card);border:1px solid var(--c-border);border-radius:12px;padding:16px;margin-bottom:12px}
.rank-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--c-border)}
.rank-row:last-child{border-bottom:none}
.rank-medal{font-size:16px;width:24px;text-align:center}
.rank-name{flex:1;font-size:13px}
.rank-val{font-size:13px;font-weight:500;color:var(--c-gold)}
.rank-tier{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:600}
.tier-plat{background:#2d1f40;color:#c084fc}
.tier-gold{background:#2d1f0f;color:#fbbf24}
.tier-silver{background:#1e2a3a;color:#94a3b8}
.tier-bronze{background:#2d1a0a;color:#d97706}

/* Skills */
.skills-section{background:var(--c-card);border:1px solid var(--c-border);border-radius:12px;padding:16px;margin-bottom:12px}
.skills-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px}
.skill-item{background:var(--c-card2);border-radius:8px;padding:10px}
.skill-name{font-size:11px;color:var(--c-muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.3px}
.skill-bar-bg{height:4px;background:#1e2535;border-radius:2px;margin-bottom:4px}
.skill-bar-fill{height:4px;border-radius:2px;background:var(--c-accent);transition:width .5s}
.skill-levels{display:flex;justify-content:space-between;font-size:11px}
.skill-base{color:var(--c-text);font-weight:500}
.skill-boosted{color:var(--c-gold)}

/* Companies */
.companies-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;margin-bottom:12px}
.company-card{background:var(--c-card);border:1px solid var(--c-border);border-radius:10px;padding:14px}
.company-name{font-size:14px;font-weight:600;margin-bottom:2px}
.company-type{font-size:11px;color:var(--c-muted);margin-bottom:10px}
.company-stats{display:flex;flex-direction:column;gap:5px}
.cstat{display:flex;justify-content:space-between;font-size:12px}
.cstat-label{color:var(--c-muted)}
.cstat-val{font-weight:500}

/* Simulator */
.sim-panel{background:var(--c-card);border:1px solid var(--c-border);border-radius:12px;padding:16px;margin-bottom:12px}
.sim-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:500px){.sim-grid{grid-template-columns:1fr}}
.sim-label{font-size:12px;color:var(--c-muted);margin-bottom:4px}
.sim-input{width:100%;background:var(--c-card2);border:1px solid var(--c-border);border-radius:6px;padding:6px 10px;color:var(--c-text);font-size:13px;outline:none}
.sim-input:focus{border-color:var(--c-accent)}
.sim-group{margin-bottom:12px}
.sim-result{background:var(--c-card2);border-radius:8px;padding:14px;margin-top:12px}
.sim-result-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:13px;border-bottom:1px solid var(--c-border)}
.sim-result-row:last-child{border-bottom:none;font-weight:600;font-size:14px;color:var(--c-gold)}
.sim-result-label{color:var(--c-muted)}
.btn-optimize{width:100%;background:var(--c-accent);color:#fff;border:none;border-radius:8px;padding:10px;cursor:pointer;font-size:14px;font-weight:500;margin-top:12px}
.btn-optimize:hover{background:#2563eb}
.btn-optimize:disabled{opacity:.5;cursor:not-allowed}
.opt-result{margin-top:12px;padding:12px;background:#0f1f10;border:1px solid #166534;border-radius:8px;font-size:12px;color:#86efac;line-height:1.8}

/* Weapon card */
.weapon-card{background:var(--c-card2);border-radius:8px;padding:10px;display:flex;align-items:center;gap:10px}
.weapon-icon{font-size:24px}
.weapon-name{font-size:13px;font-weight:500}
.weapon-sub{font-size:11px;color:var(--c-muted)}

.flag{font-size:18px;margin-right:4px}
</style>
</head>
<body>
<div class="root">
  <h2 class="sr-only">WarEra Player Portfolio & Eco-Simulator Dashboard</h2>
  <div class="search-row">
    <input type="text" id="searchInput" placeholder="Enter username or player ID (e.g. zxz)" value="zxz" />
    <button id="searchBtn" onclick="loadPlayer()">Search</button>
  </div>
  <div id="content">
    <div class="empty">
      <div class="spinner"></div>
      <br>
      <h3>WarEra Dashboard</h3>
      <p style="font-size:13px;margin-top:8px">Search a player to view their profile, stats, and run the economic simulator.</p>
    </div>
  </div>
</div>

<script>
const BASE = 'https://api2.warera.io/trpc';
let playerData = null;
let simData = {};

async function trpc(endpoint, input) {
  const url = `${BASE}/${endpoint}?input=${encodeURIComponent(JSON.stringify(input))}`;
  const r = await fetch(url, {headers:{'Content-Type':'application/json'}});
  if (!r.ok) throw new Error(`API ${r.status}`);
  const j = await r.json();
  return j.result?.data ?? j;
}

function fmt(n) {
  if (!n && n!==0) return '-';
  n = Number(n);
  if (n >= 1e9) return (n/1e9).toFixed(2)+'B';
  if (n >= 1e6) return (n/1e6).toFixed(2)+'M';
  if (n >= 1e3) return (n/1e3).toFixed(1)+'K';
  return Math.round(n).toLocaleString();
}

function tierBadge(rank) {
  if (!rank) return '';
  if (rank <= 10) return '<span class="rank-tier tier-plat">Platinum</span>';
  if (rank <= 50) return '<span class="rank-tier tier-gold">Gold</span>';
  if (rank <= 200) return '<span class="rank-tier tier-silver">Silver</span>';
  return '<span class="rank-tier tier-bronze">Bronze</span>';
}

function tierMedal(rank) {
  if (!rank) return '🎖️';
  if (rank <= 10) return '💎';
  if (rank <= 50) return '🥇';
  if (rank <= 200) return '🥈';
  return '🥉';
}

const SKILLS = ['Strength','Endurance','Intelligence','Dexterity','Charisma','Courage','Stealth','Entrepreneurship','Management','Marketing','Production','Economy','Social','Politics'];
const SKILL_KEYS = ['strength','endurance','intelligence','dexterity','charisma','courage','stealth','entrepreneurship','management','marketing','production','economy','social','politics'];

async function loadPlayer() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) return;
  document.getElementById('searchBtn').disabled = true;
  document.getElementById('content').innerHTML = '<div class="loading"><div class="spinner"></div><br>Loading player data...</div>';
  
  try {
    let user;
    if (q.length > 20) {
      user = await trpc('user.getUserById', {userId: q});
    } else {
      const r = await trpc('search.searchAnything', {searchText: q});
      const users = r?.users || r?.data?.users || [];
      if (!users.length) throw new Error('Player not found. Try a different name or ID.');
      user = users[0];
      if (user.userId || user.id) {
        const uid = user.userId || user.id;
        user = await trpc('user.getUserById', {userId: uid});
      }
    }
    
    if (!user) throw new Error('Player not found.');
    playerData = user;
    
    const uid = user.userId || user.id || user._id;
    
    // Fetch extra data in parallel
    const [equipment, companies] = await Promise.all([
      trpc('inventory.fetchCurrentEquipment', {userId: uid}).catch(()=>null),
      trpc('company.getCompanies', {userId: uid}).catch(()=>null)
    ]);
    
    playerData._equipment = equipment;
    playerData._companies = companies;
    
    // Fetch country & MU if available
    if (user.countryId || user.country) {
      const cid = user.countryId || user.country?.id || user.country;
      if (typeof cid === 'string' || typeof cid === 'number') {
        const country = await trpc('country.getCountryById', {countryId: cid}).catch(()=>null);
        playerData._country = country;
      }
    }
    if (user.muId || user.mu?.id) {
      const muId = user.muId || user.mu?.id;
      const mu = await trpc('mu.getById', {muId}).catch(()=>null);
      playerData._mu = mu;
    }
    
    renderDashboard();
  } catch(e) {
    document.getElementById('content').innerHTML = `<div class="error">⚠️ ${e.message || 'Failed to load player. Check the username and try again.'}</div><div class="empty"><h3>Try a username like <code style="font-family:monospace;font-size:13px">zxz</code></h3></div>`;
  }
  document.getElementById('searchBtn').disabled = false;
}

function renderDashboard() {
  const u = playerData;
  const skills = u.skills || u.playerSkills || {};
  const stats = u.stats || {};
  const wealth = u.wealth || {};
  const companies = u._companies?.companies || u._companies || [];
  const eq = u._equipment || {};
  const country = u._country;
  const mu = u._mu;
  
  const name = u.username || u.name || 'Unknown';
  const level = u.level || u.playerLevel || '?';
  const countryName = country?.name || u.country?.name || u.countryName || '?';
  const countryFlag = country?.flag || u.country?.flag || '';
  const muName = mu?.name || u.mu?.name || u.muName || null;
  const avatarUrl = u.avatarUrl || u.avatar || u.profilePicture || null;
  
  const totalWealth = Number(wealth.total || wealth.totalWealth || 
    ((wealth.cash||0)+(wealth.items||0)+(wealth.weapons||0)+(wealth.companies||0)+(wealth.equipment||0)) || 0);
  const wealthParts = [
    {name:'Cash',val:Number(wealth.cash||0),color:'#3b82f6'},
    {name:'Items',val:Number(wealth.items||0),color:'#8b5cf6'},
    {name:'Weapons',val:Number(wealth.weapons||0),color:'#ef4444'},
    {name:'Equipment',val:Number(wealth.equipment||0),color:'#f59e0b'},
    {name:'Companies',val:Number(wealth.companies||wealth.company||0),color:'#10b981'},
  ].filter(x=>x.val>0);
  
  const rankings = u.rankings || u.ranking || {};
  const rankItems = Object.entries(rankings).filter(([k,v])=>v && typeof v==='object' ? v.rank : typeof v==='number');
  
  // Pre-populate sim
  simData = {
    entrepreneurship: Number(skills.entrepreneurship||skills.Entrepreneurship||0),
    management: Number(skills.management||skills.Management||0),
    production: Number(skills.production||skills.Production||0),
    workers: 10,
    wage: 10,
    price: 100,
    qty: 10
  };
  
  document.getElementById('content').innerHTML = `
    <div class="tabs">
      <div class="tab active" id="tab-portfolio" onclick="showTab('portfolio')">Portfolio</div>
      <div class="tab" id="tab-simulator" onclick="showTab('simulator')">Eco Simulator</div>
    </div>
    <div id="pane-portfolio">
      ${renderPlayerCard(u, name, level, countryName, countryFlag, muName, avatarUrl)}
      ${renderWealthSection(wealthParts, totalWealth, wealth)}
      ${renderSkillsSection(skills)}
      ${renderRankingsSection(rankItems, rankings)}
      ${renderWeaponSection(eq)}
      ${renderCompaniesSection(companies)}
    </div>
    <div id="pane-simulator" style="display:none">
      ${renderSimulator(skills, companies)}
    </div>
  `;
  
  drawDonut(wealthParts, totalWealth);
  computeSim();
}

function renderPlayerCard(u, name, level, countryName, countryFlag, muName, avatarUrl) {
  const initials = name.slice(0,2).toUpperCase();
  const avatarHtml = avatarUrl 
    ? `<div class="avatar"><img src="${avatarUrl}" alt="${name}" onerror="this.parentElement.textContent='${initials}'"></div>`
    : `<div class="avatar">${initials}</div>`;
  return `
  <div class="player-card">
    <div class="player-header">
      ${avatarHtml}
      <div class="player-info">
        <h2>${name}</h2>
        <div class="sub">ID: ${u.userId||u.id||u._id||'—'}</div>
        <div class="badges">
          <span class="badge badge-level">Lv. ${level}</span>
          ${countryFlag?`<span class="flag">${countryFlag}</span>`:''}
          <span class="badge badge-country">${countryName}</span>
          ${muName?`<span class="badge badge-mu">${muName}</span>`:''}
        </div>
      </div>
    </div>
  </div>`;
}

function renderWealthSection(parts, total, wealth) {
  if (!parts.length && !total) return '';
  const legendHtml = parts.map(p=>`
    <div class="legend-item">
      <div class="legend-dot" style="background:${p.color}"></div>
      <div class="legend-name">${p.name}</div>
      <div class="legend-val">${fmt(p.val)} cc</div>
    </div>`).join('');
  return `
  <div class="wealth-section">
    <div class="section-title">Wealth Breakdown</div>
    <div class="wealth-chart">
      <div class="donut-wrap">
        <svg viewBox="0 0 120 120" id="donut-svg"></svg>
        <div class="donut-center">
          <div class="donut-total">${fmt(total)}</div>
          <div class="donut-label">cc total</div>
        </div>
      </div>
      <div class="wealth-legend">${legendHtml}</div>
    </div>
  </div>`;
}

function drawDonut(parts, total) {
  const svg = document.getElementById('donut-svg');
  if (!svg || !parts.length) return;
  const cx=60,cy=60,r=46,stroke=14;
  const circ = 2*Math.PI*r;
  let offset = 0;
  let html = '';
  for (const p of parts) {
    const pct = total>0 ? p.val/total : 1/parts.length;
    const dash = pct*circ;
    const gap = circ-dash;
    html += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${p.color}" stroke-width="${stroke}" stroke-dasharray="${dash.toFixed(2)} ${gap.toFixed(2)}" stroke-dashoffset="${(-offset*circ).toFixed(2)}" transform="rotate(-90 ${cx} ${cy})" opacity="0.9"/>`;
    offset += pct;
  }
  svg.innerHTML = `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#1e2535" stroke-width="${stroke}"/>${html}`;
}

function renderSkillsSection(skills) {
  const keys = SKILL_KEYS;
  const labels = SKILLS;
  const items = keys.map((k,i)=>{
    const raw = Number(skills[k]||skills[labels[i]]||0);
    const boosted = Number(skills[k+'Boosted']||skills[k+'Total']||raw);
    const pct = Math.min(100, (raw/100)*100);
    return `<div class="skill-item">
      <div class="skill-name">${labels[i]}</div>
      <div class="skill-bar-bg"><div class="skill-bar-fill" style="width:${pct}%"></div></div>
      <div class="skill-levels">
        <span class="skill-base">${raw}</span>
        ${boosted>raw?`<span class="skill-boosted">+${boosted-raw} boosted</span>`:''}
      </div>
    </div>`;
  }).join('');
  return `<div class="skills-section">
    <div class="section-title">Skills</div>
    <div class="skills-grid">${items}</div>
  </div>`;
}

function renderRankingsSection(rankItems, rankings) {
  if (!rankItems.length) return '';
  const rows = rankItems.slice(0,8).map(([k,v])=>{
    const rank = typeof v==='object' ? v.rank : v;
    const val = typeof v==='object' ? v.value||v.score||'' : '';
    return `<div class="rank-row">
      <span class="rank-medal">${tierMedal(rank)}</span>
      <span class="rank-name">${k.replace(/([A-Z])/g,' $1').trim()}</span>
      ${val?`<span class="rank-val">${fmt(val)}</span>`:''}
      ${tierBadge(rank)}
      <span style="font-size:13px;color:var(--c-muted);min-width:32px;text-align:right">#${rank}</span>
    </div>`;
  }).join('');
  return `<div class="rank-section">
    <div class="section-title">Rankings</div>
    ${rows}
  </div>`;
}

function renderWeaponSection(eq) {
  const weapon = eq?.weapon || eq?.currentWeapon || null;
  if (!weapon) return '';
  return `<div class="wealth-section">
    <div class="section-title">Equipment</div>
    <div class="weapon-card">
      <div class="weapon-icon">⚔️</div>
      <div>
        <div class="weapon-name">${weapon.name||weapon.weaponName||'Unknown Weapon'}</div>
        <div class="weapon-sub">Quality: ${weapon.quality||weapon.q||'?'} • Dmg: ${weapon.damage||weapon.dmg||'?'}</div>
      </div>
    </div>
  </div>`;
}

function renderCompaniesSection(companies) {
  if (!companies || !companies.length) return '';
  const cards = companies.slice(0,6).map(c=>`
    <div class="company-card">
      <div class="company-name">${c.name||c.companyName||'Company'}</div>
      <div class="company-type">${c.type||c.companyType||c.industry||''}</div>
      <div class="company-stats">
        <div class="cstat"><span class="cstat-label">Workers</span><span class="cstat-val">${c.workers||c.workerCount||0}</span></div>
        <div class="cstat"><span class="cstat-label">AE Level</span><span class="cstat-val">${c.aeLevel||c.automatedEngineLevel||0}</span></div>
        <div class="cstat"><span class="cstat-label">Valuation</span><span class="cstat-val">${fmt(c.valuation||c.value||0)} cc</span></div>
        <div class="cstat"><span class="cstat-label">Concrete Inv.</span><span class="cstat-val">${fmt(c.concreteInvestment||c.concrete||0)}</span></div>
      </div>
    </div>`).join('');
  return `<div class="wealth-section">
    <div class="section-title">Companies (${companies.length})</div>
    <div class="companies-grid">${cards}</div>
  </div>`;
}

function renderSimulator(skills, companies) {
  const ent = Number(skills.entrepreneurship||skills.Entrepreneurship||0);
  const mgmt = Number(skills.management||skills.Management||0);
  const prod = Number(skills.production||skills.Production||0);
  return `
  <div class="sim-panel">
    <div class="section-title">Economic Simulator & Optimizer</div>
    <div class="sim-grid">
      <div>
        <div class="sim-group">
          <div class="sim-label">Entrepreneurship skill</div>
          <input class="sim-input" type="number" id="sim-ent" value="${ent}" min="0" max="100" oninput="computeSim()">
        </div>
        <div class="sim-group">
          <div class="sim-label">Management skill</div>
          <input class="sim-input" type="number" id="sim-mgmt" value="${mgmt}" min="0" max="100" oninput="computeSim()">
        </div>
        <div class="sim-group">
          <div class="sim-label">Production skill</div>
          <input class="sim-input" type="number" id="sim-prod" value="${prod}" min="0" max="100" oninput="computeSim()">
        </div>
      </div>
      <div>
        <div class="sim-group">
          <div class="sim-label">Workers employed</div>
          <input class="sim-input" type="number" id="sim-workers" value="10" min="0" max="200" oninput="computeSim()">
        </div>
        <div class="sim-group">
          <div class="sim-label">Daily wage (cc)</div>
          <input class="sim-input" type="number" id="sim-wage" value="10" min="0" oninput="computeSim()">
        </div>
        <div class="sim-group">
          <div class="sim-label">Sale price per unit (cc)</div>
          <input class="sim-input" type="number" id="sim-price" value="100" min="0" oninput="computeSim()">
        </div>
        <div class="sim-group">
          <div class="sim-label">Units produced per day</div>
          <input class="sim-input" type="number" id="sim-qty" value="10" min="0" oninput="computeSim()">
        </div>
      </div>
    </div>
    <div class="sim-result" id="sim-output"></div>
    <button class="btn-optimize" onclick="runOptimizer()">Find best skill allocation ↗</button>
    <div id="opt-result"></div>
  </div>`;
}

function computeSim() {
  const ent = Number(document.getElementById('sim-ent')?.value||0);
  const mgmt = Number(document.getElementById('sim-mgmt')?.value||0);
  const prod = Number(document.getElementById('sim-prod')?.value||0);
  const workers = Number(document.getElementById('sim-workers')?.value||0);
  const wage = Number(document.getElementById('sim-wage')?.value||0);
  const price = Number(document.getElementById('sim-price')?.value||0);
  const qty = Number(document.getElementById('sim-qty')?.value||0);
  
  // WarEra-style formulas (adapted from simulator logic)
  const entBonus = 1 + (ent / 100) * 0.5;
  const mgmtBonus = 1 + (mgmt / 100) * 0.3;
  const prodBonus = 1 + (prod / 100) * 0.4;
  
  const workerCapMultiplier = mgmtBonus;
  const maxWorkers = Math.floor(workers * workerCapMultiplier);
  const effectiveWorkers = Math.min(workers, maxWorkers);
  
  const productionMultiplier = entBonus * prodBonus;
  const dailyOutput = qty * productionMultiplier;
  
  const revenue = dailyOutput * price;
  const wageCost = effectiveWorkers * wage;
  const profit = revenue - wageCost;
  const profitPerWorker = effectiveWorkers > 0 ? profit / effectiveWorkers : 0;
  
  const out = document.getElementById('sim-output');
  if (!out) return;
  out.innerHTML = `
    <div class="sim-result-row"><span class="sim-result-label">Ent. multiplier</span><span>${entBonus.toFixed(3)}x</span></div>
    <div class="sim-result-row"><span class="sim-result-label">Prod. multiplier</span><span>${(entBonus*prodBonus).toFixed(3)}x</span></div>
    <div class="sim-result-row"><span class="sim-result-label">Daily output</span><span>${dailyOutput.toFixed(1)} units</span></div>
    <div class="sim-result-row"><span class="sim-result-label">Daily revenue</span><span>${fmt(revenue)} cc</span></div>
    <div class="sim-result-row"><span class="sim-result-label">Wage costs</span><span>-${fmt(wageCost)} cc</span></div>
    <div class="sim-result-row"><span class="sim-result-label">Profit / worker</span><span>${fmt(profitPerWorker)} cc</span></div>
    <div class="sim-result-row"><span class="sim-result-label">Daily profit</span><span class="gold-text">${fmt(profit)} cc</span></div>
  `;
}

function runOptimizer() {
  const btn = document.querySelector('.btn-optimize');
  btn.disabled = true;
  btn.textContent = 'Optimizing...';
  
  const workers = Number(document.getElementById('sim-workers')?.value||10);
  const wage = Number(document.getElementById('sim-wage')?.value||10);
  const price = Number(document.getElementById('sim-price')?.value||100);
  const qty = Number(document.getElementById('sim-qty')?.value||10);
  const skillPoints = 100;
  
  setTimeout(()=>{
    // Hill-climbing optimizer: try all splits of (skillPoints) across ent, mgmt, prod
    let best = {profit:-Infinity, ent:0, mgmt:0, prod:0};
    const step = 5;
    for (let e=0; e<=skillPoints; e+=step) {
      for (let m=0; m<=skillPoints-e; m+=step) {
        const p = skillPoints-e-m;
        if (p<0) continue;
        const entB = 1+(e/100)*0.5;
        const mgmtB = 1+(m/100)*0.3;
        const prodB = 1+(p/100)*0.4;
        const rev = qty*entB*prodB*price;
        const cost = workers*wage;
        const profit = rev-cost;
        if (profit>best.profit) best={profit,ent:e,mgmt:m,prod:p};
      }
    }
    
    document.getElementById('opt-result').innerHTML = `
      <div class="opt-result">
        <strong>Optimal allocation found!</strong><br>
        Entrepreneurship: ${best.ent} pts<br>
        Management: ${best.mgmt} pts<br>
        Production: ${best.prod} pts<br>
        <br>
        → Projected daily profit: <strong>${fmt(best.profit)} cc</strong>
      </div>`;
    
    document.getElementById('sim-ent').value = best.ent;
    document.getElementById('sim-mgmt').value = best.mgmt;
    document.getElementById('sim-prod').value = best.prod;
    computeSim();
    
    btn.disabled = false;
    btn.textContent = 'Find best skill allocation ↗';
  }, 600);
}

function showTab(t) {
  document.getElementById('tab-portfolio').className = 'tab'+(t==='portfolio'?' active':'');
  document.getElementById('tab-simulator').className = 'tab'+(t==='simulator'?' active':'');
  document.getElementById('pane-portfolio').style.display = t==='portfolio'?'block':'none';
  document.getElementById('pane-simulator').style.display = t==='simulator'?'block':'none';
}

// Auto-load on start
window.addEventListener('load', loadPlayer);
</script>
